<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panora</title>
    <script>
      const path = window.location.pathname.replace(/^\/panaro-app/, "");
      const normalizedPath = path.startsWith("/") ? path : `/${path}`;
      const search = window.location.search || "";
      const hashTarget = `/panaro-app/#${normalizedPath}${search}`;
      window.location.replace(hashTarget);
    </script>
  </head>
  <body></body>
</html>
